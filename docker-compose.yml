version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: catalyst
      POSTGRES_PASSWORD: catalyst_secret_2024
      POSTGRES_DB: catalyst_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalyst -d catalyst_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ───────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Qdrant Vector DB ──────────────────────────
  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── FastAPI Backend ────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://catalyst:catalyst_secret_2024@db:5432/catalyst_db
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      QDRANT_HOST: qdrant
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads

  # ── Interest Scoring Worker ────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m worker.interest_scorer
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://catalyst:catalyst_secret_2024@db:5432/catalyst_db
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      QDRANT_HOST: qdrant
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
  qdrant_data:
